<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'">
  <title>NetFlow Monitor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #1e1e2e;
      --text: #cdd6f4;
      --text-dim: #6c7086;
      --accent: #89b4fa;
      --green: #a6e3a1;
      --yellow: #f9e2af;
      --red: #f38ba8;
      --purple: #cba6f7;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: drag;
    }

    .titlebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 36px;
      padding: 0 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .titlebar-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dim);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .titlebar-actions {
      display: flex;
      gap: 2px;
      -webkit-app-region: no-drag;
    }
    .titlebar-actions button {
      width: 36px;
      height: 28px;
      border: none;
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      transition: all 0.15s;
    }
    .titlebar-actions button:hover { background: var(--border); color: var(--text); }
    .titlebar-actions .close:hover { background: var(--red); color: #fff; }

    .container {
      height: calc(100vh - 36px);
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 12px;
      -webkit-app-region: no-drag;
    }

    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .controls input {
      flex: 1;
      min-width: 200px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      font-family: 'Consolas', 'Cascadia Code', 'Fira Code', monospace;
      outline: none;
      transition: border-color 0.15s;
    }
    .controls input:focus { border-color: var(--accent); }
    .controls input::placeholder { color: var(--text-dim); }
    .interval-select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-family: 'Consolas', monospace;
      outline: none;
      cursor: pointer;
      min-width: 60px;
    }
    .interval-select:focus { border-color: var(--accent); }

    .btn {
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .btn-start {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }
    .btn-start:hover { opacity: 0.9; }
    .btn-start.active {
      background: var(--red);
      border-color: var(--red);
    }
    .btn-clear { background: transparent; color: var(--text-dim); }
    .btn-clear:hover { background: var(--border); color: var(--text); }
    .btn-sm { padding: 6px 12px; font-size: 12px; }

    .update-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      background: rgba(137,180,250,0.12);
      border: 1px solid rgba(137,180,250,0.3);
      border-radius: 8px;
      font-size: 13px;
      color: var(--accent);
    }
    .update-banner.hidden { display: none; }

    .stats {
      display: flex;
      gap: 12px;
    }
    .stat-card {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
    }
    .stat-label {
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .stat-value {
      font-size: 22px;
      font-weight: 700;
      font-family: 'Consolas', 'Cascadia Code', monospace;
    }
    .stat-value.connections { color: var(--accent); }
    .stat-value.destinations { color: var(--purple); }
    .stat-value.throughput { color: var(--green); }
    .stat-value.bandwidth { color: var(--yellow); }

    .bw-card .stat-label { margin-bottom: 8px; }
    .bw-details {
      display: flex;
      gap: 12px;
    }
    .bw-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .bw-label {
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .bw-value {
      font-size: 18px;
      font-weight: 700;
      font-family: 'Consolas', 'Cascadia Code', monospace;
      color: var(--yellow);
    }

    .dest-table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      max-height: 200px;
      overflow-y: auto;
    }
    .dest-table-wrap::-webkit-scrollbar { width: 6px; }
    .dest-table-wrap::-webkit-scrollbar-track { background: transparent; }
    .dest-table-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .dest-table-title {
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      font-weight: 600;
    }
    .dest-table {
      display: grid;
      grid-template-columns: 1fr 80px 100px;
      gap: 8px 12px;
      font-family: 'Consolas', 'Cascadia Code', monospace;
      font-size: 13px;
    }
    .dest-header {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding-bottom: 4px;
      border-bottom: 1px solid var(--border);
    }
    .dest-cell {
      padding: 4px 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .dest-cell.ip { color: var(--accent); font-weight: 500; }
    .dest-cell.count { color: var(--purple); text-align: center; }
    .dest-cell.bw { color: var(--yellow); font-weight: 500; text-align: right; }

    .chart-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      height: 120px;
    }
    .chart-wrap canvas {
      width: 100%;
      height: 100%;
    }

    .table-wrap {
      flex: 1;
      overflow: hidden;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
    }
    .table-header {
      display: grid;
      grid-template-columns: 140px 60px 160px 60px 60px 100px 90px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 10px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      background: rgba(255,255,255,0.02);
    }
    .table-body {
      flex: 1;
      overflow-y: auto;
      font-family: 'Consolas', 'Cascadia Code', 'Fira Code', monospace;
      font-size: 13px;
    }
    .table-body::-webkit-scrollbar {
      width: 6px;
    }
    .table-body::-webkit-scrollbar-track { background: transparent; }
    .table-body::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }
    .table-row {
      display: grid;
      grid-template-columns: 140px 60px 160px 60px 60px 100px 90px;
      padding: 9px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      transition: background 0.1s;
    }
    .table-row:hover { background: rgba(255,255,255,0.03); }
    .table-row.new { animation: flashIn 0.5s ease; }

    @keyframes flashIn {
      from { background: rgba(137,180,250,0.15); }
      to { background: transparent; }
    }

    .cell {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .cell.proto-tcp { color: var(--green); }
    .cell.proto-udp { color: var(--yellow); }
    .cell.remote { color: var(--accent); font-weight: 500; }
    .cell.bw { color: var(--yellow); font-weight: 500; text-align: right; padding-right: 8px; }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-dim);
      gap: 8px;
    }
    .empty-state svg { opacity: 0.3; }
    .empty-state p { font-size: 13px; }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      border-radius: 0 0 8px 8px;
      font-size: 11px;
      color: var(--text-dim);
    }
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
    }
    .status-dot.live { background: var(--green); animation: pulse 2s infinite; }
    .status-dot.idle { background: var(--text-dim); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div class="titlebar">
    <span class="titlebar-title">NetFlow Monitor</span>
    <div class="titlebar-actions">
      <button onclick="window.api.checkUpdate()" title="Check for updates" style="margin-right:4px">↻</button>
      <button onclick="window.api.minimize()" title="Minimize">─</button>
      <button onclick="window.api.maximize()" title="Maximize">□</button>
      <button class="close" onclick="window.api.close()" title="Close">✕</button>
    </div>
  </div>

  <div class="container">
    <!-- Update notification -->
    <div class="update-banner hidden" id="updateBanner">
      <span id="updateText"></span>
      <a id="updateLink" href="#" target="_blank" class="btn btn-start btn-sm" style="display:none">Download Update</a>
    </div>

    <div class="controls">
      <input type="text" id="targetInput" placeholder="192.168.1.0/24, 10.0.0.5, api.example.com" value="">
      <select class="interval-select" id="intervalSelect">
        <option value="1000">1s</option>
        <option value="5000">5s</option>
        <option value="30000">30s</option>
      </select>
      <button class="btn btn-start" id="btnStart" onclick="toggleMonitor()">▶ Start</button>
      <button class="btn btn-clear" onclick="clearData()">Clear</button>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">Active Connections</div>
        <div class="stat-value connections" id="connCount">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Unique Destinations</div>
        <div class="stat-value destinations" id="destCount">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Flows</div>
        <div class="stat-value throughput" id="flowCount">0</div>
      </div>
      <div class="stat-card bw-card">
        <div class="stat-label">Bandwidth (MB)</div>
        <div class="bw-details">
          <div class="bw-item">
            <span class="bw-label">Last</span>
            <span class="bw-value" id="bwLast">—</span>
          </div>
          <div class="bw-item">
            <span class="bw-label">Avg</span>
            <span class="bw-value" id="bwAvg">—</span>
          </div>
          <div class="bw-item">
            <span class="bw-label">Max</span>
            <span class="bw-value" id="bwMax">—</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Bandwidth chart -->
    <div class="chart-wrap" id="chartWrap">
      <canvas id="bwChart"></canvas>
    </div>

    <!-- Destination breakdown (Torch style) -->
    <div class="dest-table-wrap">
      <div class="dest-table-title">Traffic per Destination (Torch)</div>
      <div class="dest-table" id="destTable">
        <span class="dest-header">Destination IP</span>
        <span class="dest-header">Conns</span>
        <span class="dest-header">MB</span>
      </div>
    </div>

    <div class="table-wrap">
      <div class="table-header">
        <span>Source</span>
        <span>Port</span>
        <span>Destination</span>
        <span>Port</span>
        <span>Proto</span>
        <span>Process</span>
        <span>MB</span>
      </div>
      <div class="table-body" id="tableBody">
        <div class="empty-state">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/>
            <path d="M2 12h20M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>
          </svg>
          <p>Enter a target IP, prefix, or domain and click Start</p>
        </div>
      </div>
      <div class="status-bar">
        <span><span class="status-dot idle" id="statusDot"></span><span id="statusText">Idle</span></span>
        <span id="lastUpdate"></span>
      </div>
    </div>
  </div>

  <script>
    let isMonitoring = false;
    let connections = new Map();
    let totalFlows = 0;
    let cleanup;
    let bwHistory = []; // for chart

    // Init chart
    const chartCanvas = document.getElementById('bwChart');
    const chartCtx = chartCanvas.getContext('2d');

    function drawChart() {
      const cw = chartCanvas.width = chartCanvas.parentElement.clientWidth - 32;
      const ch = chartCanvas.height = chartCanvas.parentElement.clientHeight - 24;
      if (bwHistory.length < 2) return;

      chartCtx.clearRect(0, 0, cw, ch);

      const maxBw = Math.max(...bwHistory, 0.01);
      const padding = { top: 8, right: 8, bottom: 20, left: 48 };
      const w = cw - padding.left - padding.right;
      const h = ch - padding.top - padding.bottom;
      const stepX = w / Math.max(bwHistory.length - 1, 1);

      // Grid lines
      chartCtx.strokeStyle = 'rgba(255,255,255,0.05)';
      chartCtx.lineWidth = 1;
      for (let i = 0; i <= 4; i++) {
        const y = padding.top + h * (i / 4);
        chartCtx.beginPath();
        chartCtx.moveTo(padding.left, y);
        chartCtx.lineTo(cw - padding.right, y);
        chartCtx.stroke();
      }

      // Labels
      chartCtx.fillStyle = '#6c7086';
      chartCtx.font = '10px Consolas, monospace';
      chartCtx.textAlign = 'right';
      for (let i = 0; i <= 4; i++) {
        const val = (maxBw * (1 - i / 4)).toFixed(2);
        chartCtx.fillText(val, padding.left - 6, padding.top + h * (i / 4) + 4);
      }

      // Time labels
      chartCtx.textAlign = 'center';
      const now = Date.now();
      const labels = [now - (bwHistory.length - 1) * 1000, now];
      for (let i = 0; i <= 1; i++) {
        const t = new Date(labels[i]);
        const label = t.getHours().toString().padStart(2, '0') + ':' + t.getMinutes().toString().padStart(2, '0') + ':' + t.getSeconds().toString().padStart(2, '0');
        chartCtx.fillText(label, padding.left + w * i, ch - 4);
      }

      // Line
      chartCtx.beginPath();
      chartCtx.strokeStyle = 'rgba(249,226,175,0.9)';
      chartCtx.lineWidth = 2;
      chartCtx.shadowColor = 'rgba(249,226,175,0.3)';
      chartCtx.shadowBlur = 6;

      for (let i = 0; i < bwHistory.length; i++) {
        const x = padding.left + i * stepX;
        const y = padding.top + h * (1 - bwHistory[i] / maxBw);
        if (i === 0) chartCtx.moveTo(x, y);
        else chartCtx.lineTo(x, y);
      }
      chartCtx.stroke();
      chartCtx.shadowBlur = 0;

      // Fill
      chartCtx.lineTo(padding.left + (bwHistory.length - 1) * stepX, padding.top + h);
      chartCtx.lineTo(padding.left, padding.top + h);
      chartCtx.closePath();
      const grad = chartCtx.createLinearGradient(0, padding.top, 0, padding.top + h);
      grad.addColorStop(0, 'rgba(249,226,175,0.15)');
      grad.addColorStop(1, 'rgba(249,226,175,0.01)');
      chartCtx.fillStyle = grad;
      chartCtx.fill();
    }

    function toggleMonitor() {
      const btn = document.getElementById('btnStart');
      const input = document.getElementById('targetInput');
      const interval = parseInt(document.getElementById('intervalSelect').value);

      if (isMonitoring) {
        window.api.stopMonitor();
        isMonitoring = false;
        btn.textContent = '▶ Start';
        btn.classList.remove('active');
        setStatus(false);
        if (cleanup) cleanup();
        return;
      }

      const raw = input.value.trim();
      const targets = raw ? raw.split(',').map(s => s.trim()).filter(Boolean) : [];
      window.api.startMonitor(targets, interval);
      isMonitoring = true;
      btn.textContent = '■ Stop';
      btn.classList.add('active');
      setStatus(true);
      bwHistory = []; // reset chart

      cleanup = window.api.onTrafficData((data) => {
        if (!data.connections) return;
        const now = Date.now();
        let newCount = 0;

        // Track bandwidth for chart (max 120 points)
        if (data.totalBwMB !== undefined) {
          bwHistory.push(data.totalBwMB);
          if (bwHistory.length > 120) bwHistory.shift();

          // Update last/avg/max
          const last = bwHistory[bwHistory.length - 1];
          const avg = (bwHistory.reduce((a, b) => a + b, 0) / bwHistory.length).toFixed(2);
          const max = Math.max(...bwHistory).toFixed(2);
          document.getElementById('bwLast').textContent = last.toFixed(2);
          document.getElementById('bwAvg').textContent = avg;
          document.getElementById('bwMax').textContent = max;
          drawChart();
        }

        // Update destination table (Torch-style)
        if (data.destinations) {
          updateDestTable(data.destinations);
        }

        // Update connections
        for (const conn of data.connections) {
          const key = `${conn.LocalAddress}:${conn.LocalPort}-${conn.RemoteAddress}:${conn.RemotePort}`;
          const isNew = !connections.has(key);

          connections.set(key, {
            ...conn,
            isNew,
            mb: conn.MB || 0,
            firstSeen: connections.get(key)?.firstSeen || conn.Timestamp,
            lastSeen: conn.Timestamp,
          });

          if (isNew) {
            newCount++;
            totalFlows++;
          }
        }

        // Remove stale connections (older than 5s)
        for (const [key, conn] of connections) {
          if (now - new Date(conn.lastSeen).getTime() > 5000) {
            connections.delete(key);
          }
        }

        updateTable();
        updateStats();
        document.getElementById('lastUpdate').textContent =
          new Date().toLocaleTimeString();
      });
    }

    function updateTable() {
      const tbody = document.getElementById('tableBody');
      if (connections.size === 0) {
        tbody.innerHTML = `
          <div class="empty-state">
            <p>No active connections to monitored targets</p>
          </div>`;
        return;
      }

      const sorted = Array.from(connections.values())
        .sort((a, b) => new Date(b.lastSeen) - new Date(a.lastSeen))
        .slice(0, 200);

      tbody.innerHTML = sorted.map(c => `
        <div class="table-row${c.isNew ? ' new' : ''}">
          <span class="cell">${escapeHtml(c.LocalAddress)}</span>
          <span class="cell">${c.LocalPort}</span>
          <span class="cell remote">${escapeHtml(c.RemoteAddress)}</span>
          <span class="cell">${c.RemotePort}</span>
          <span class="cell proto-${c.Protocol.toLowerCase()}">${c.Protocol}</span>
          <span class="cell">${escapeHtml(c.Process)}</span>
          <span class="cell bw">${c.mb ? c.mb + ' MB' : '—'}</span>
        </div>
      `).join('');

      // Reset isNew flag after first render
      for (const c of connections.values()) c.isNew = false;
    }

    function updateDestTable(destinations) {
      const table = document.getElementById('destTable');
      if (!destinations || destinations.length === 0) {
        table.innerHTML = `
          <span class="dest-header">Destination IP</span>
          <span class="dest-header">Conns</span>
          <span class="dest-header">MB</span>
        `;
        return;
      }

      // Sort by MB descending
      const sorted = destinations.sort((a, b) => b.MB - a.MB);
      
      table.innerHTML = `
        <span class="dest-header">Destination IP</span>
        <span class="dest-header">Conns</span>
        <span class="dest-header">MB</span>
      ` + sorted.map(d => `
        <span class="dest-cell ip">${escapeHtml(d.RemoteAddress)}</span>
        <span class="dest-cell count">${d.Connections}</span>
        <span class="dest-cell bw">${d.MB.toFixed(2)}</span>
      `).join('');
    }

    function updateStats() {
      document.getElementById('connCount').textContent = connections.size;
      const uniqueDests = new Set(
        Array.from(connections.values()).map(c => c.RemoteAddress)
      ).size;
      document.getElementById('destCount').textContent = uniqueDests;
      document.getElementById('flowCount').textContent = totalFlows;
    }

    function clearData() {
      connections.clear();
      totalFlows = 0;
      bwHistory = [];
      updateTable();
      updateStats();
      document.getElementById('bwLast').textContent = '—';
      document.getElementById('bwAvg').textContent = '—';
      document.getElementById('bwMax').textContent = '—';
      drawChart();
    }

    function setStatus(live) {
      const dot = document.getElementById('statusDot');
      const text = document.getElementById('statusText');
      dot.className = 'status-dot ' + (live ? 'live' : 'idle');
      text.textContent = live ? 'Monitoring' : 'Idle';
    }

    function escapeHtml(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // Auto-update listener
    window.api.onUpdateStatus((data) => {
      const banner = document.getElementById('updateBanner');
      const text = document.getElementById('updateText');
      const link = document.getElementById('updateLink');
      banner.classList.remove('hidden');

      switch (data.status) {
        case 'available':
          text.textContent = `v${data.version} available —`;
          link.href = data.url;
          link.style.display = 'inline-flex';
          break;
        case 'checking':
          banner.classList.add('hidden');
          break;
        case 'none':
          banner.classList.add('hidden');
          break;
        case 'error':
          text.textContent = `Update check failed: ${data.message}`;
          link.style.display = 'none';
          setTimeout(() => banner.classList.add('hidden'), 5000);
          break;
      }
    });
  </script>
</body>
</html>
